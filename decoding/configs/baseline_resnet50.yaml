experiment:
  name: baseline_resnet50

model:
  architecture: resnet50
  pretrained: true

training:
  batch_size: 16
  num_epochs: 30
  learning_rate: 0.0001

data:
  image_size: 1024
  splits_path: data/splits.json
  metadata_path: "${PROJECT_DATA_ROOT}/watermark_encoding/data/metadata.json"
  images_path: "${PROJECT_DATA_ROOT}/watermark_encoding/data/images/"

output:
  checkpoint: "${PROJECT_DATA_ROOT}/decoding/checkpoints/baseline_resnet50.pth"
  results: evaluation/results/metrics/baseline_resnet50.md

seed: 42
